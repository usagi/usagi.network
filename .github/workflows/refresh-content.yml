name: Refresh stream content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci

      - name: Run fetcher
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_CHANNEL_LOGIN: usaginetwork
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          node scripts/fetch-stream-data.cjs
          node scripts/fetch-soundcloud-data.cjs
          node scripts/refresh-software-releases.cjs
          node scripts/normalize-software-media.cjs
          node scripts/build-latest-activity.cjs

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit";
          else
            git config user.name "github-actions"
            git config user.email "actions@users.noreply.github.com"
            git add assets/data/stream/*.json assets/data/soundcloud-tracks.json assets/data/software.json assets/data/latest-activity.json
            git commit -m "chore(data): refresh auto data"
            git push --force origin HEAD:auto-data
            gh workflow run deploy-pages --ref main
          fi
