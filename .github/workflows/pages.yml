name: deploy-pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Node dependencies
        run: npm ci
      - name: Overlay auto-refreshed data
        run: |
          git fetch origin auto-data --depth=1 || true
          git checkout FETCH_HEAD -- assets/data || true
      - name: Check content assets
        run: npm run check:content
      - name: Build (Astro)
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke test built site
        run: |
          node scripts/serve-static.cjs dist 4173 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 1
          done
          npm run smoke:site -- http://127.0.0.1:4173/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
